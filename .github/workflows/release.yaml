name: Release

on:
  push:
    branches:
      - master
    paths:
      - "src/**"
      - "Cargo.toml"
      - "Cargo.lock"
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      profile:
        description: "Build profile"
        required: true
        default: "release"
        type: choice
        options:
          - release
          - debug

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: agsh-linux-amd64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: agsh-windows-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: agsh-macos-arm64

    runs-on: ${{ matrix.os }}

    env:
      BUILD_PROFILE: ${{ (startsWith(github.ref, 'refs/tags/') || inputs.profile == 'release') && 'release' || 'debug' }}
      CARGO_FLAGS: ${{ (startsWith(github.ref, 'refs/tags/') || inputs.profile == 'release') && '--release' || '' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build ${{ env.CARGO_FLAGS }} --target ${{ matrix.target }}

      - name: Package artifacts (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p staging
          cp target/${{ matrix.target }}/${{ env.BUILD_PROFILE }}/agsh staging/
          tar -czf ${{ matrix.artifact }}.tar.gz -C staging .

      - name: Package artifacts (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging
          Copy-Item "target/${{ matrix.target }}/${{ env.BUILD_PROFILE }}/agsh.exe" staging/
          Compress-Archive -Path staging/* -DestinationPath "${{ matrix.artifact }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: artifacts/*
